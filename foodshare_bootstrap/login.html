<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FoodShare - Login/Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top fs-navbar">
  <div class="container page-wrap py-2">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="index.html">
      <span class="brand-mark"></span>
      <span>FoodShare</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="mainNav">
      <div class="navbar-nav gap-2 mt-3 mt-lg-0">
        <a class="nav-link fs-link " href="index.html">Home</a>
        <a class="nav-link fs-link " href="search.html">Browse</a>
        <a class="nav-link fs-link " href="dashboard.html">Provider Dashboard</a>
        <a class="nav-link fs-link active" href="login.html">Login/Register</a>
      </div>
    </div>
  </div>
</nav>

<main class="container page-wrap py-4 py-md-5">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="fs-card p-4">
        <div class="row g-4">
          <div class="col-12 col-md-6">
            <h2 class="fs-title-md">Login</h2>
            <form>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" placeholder="name@example.com">
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" placeholder="Enter password">
              </div>
              <button class="btn btn-fs-primary w-100" type="button">Login</button>
            </form>
          </div>
          <div class="col-12 col-md-6">
            <h2 class="fs-title-md">Register</h2>
            <form>
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" placeholder="Full name or organization">
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" placeholder="name@example.com">
              </div>
              <div class="mb-3">
                <label class="form-label">Account type</label>
                <select class="form-select">
                  <option>User</option>
                  <option>Provider</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" placeholder="Create password">
              </div>
              <button class="btn btn-fs-secondary w-100" type="button">Create Account</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="app.js"></script>
</body>
</html>
