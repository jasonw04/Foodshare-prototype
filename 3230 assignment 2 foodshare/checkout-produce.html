<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FoodShare - Checkout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top fs-navbar">
  <div class="container page-wrap py-2">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="index.html">
      <span class="brand-mark"></span>
      <span>FoodShare</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="mainNav">
      <div class="navbar-nav gap-2 mt-3 mt-lg-0">
        <a class="nav-link fs-link " href="index.html">Home</a>
        <a class="nav-link fs-link active" href="search.html">Browse</a>
        <a class="nav-link fs-link " href="dashboard.html">Provider Dashboard</a>
        <a class="nav-link fs-link " href="login.html">Login/Register</a>
      </div>
    </div>
  </div>
</nav>

<main class="container page-wrap py-4 py-md-5">
  <div class="row g-3">
    <div class="col-12 col-lg-6">
      <div class="fs-card p-4 h-100">
        <!-- order summary details -->
        <h2 class="fs-title-md">Order Summary</h2>
        <div class="kv-row"><span class="k-label">Item</span><span class="k-value">Community Produce Box</span></div>
        <div class="kv-row"><span class="k-label">Provider</span><span class="k-value">Community Kitchen</span></div>
        <div class="kv-row"><span class="k-label">Pickup Window</span><span class="k-value">5–7 PM (Today)</span></div>
        <div class="kv-row"><span class="k-label">Allergens</span><span class="k-value">None listed</span></div>
        <div class="kv-row"><span class="k-label">Total</span><span class="k-value">Donation / Voucher</span></div>
      </div>
    </div>
    <!-- payment options -->
    <div class="col-12 col-lg-6">
      <div class="fs-card p-4 h-100">
        <h2 class="fs-title-md">Checkout</h2>
        <p class="mb-3">Payment mode: <span id="modeLabel">Pay Online</span></p>
        <div class="d-flex flex-wrap gap-2">
          <label class="btn btn-fs-outline" id="payBtn">
            <!-- toggle between pay online and voucher options -->
            <input class="form-check-input me-2" type="radio" name="paymode" value="pay" checked>Pay Online
          </label>
          <label class="btn btn-fs-outline" id="voucherBtn">
            <input class="form-check-input me-2" type="radio" name="paymode" value="voucher">Redeem Voucher
          </label>
        </div>
        <!-- payment form for card details or voucher code -->
        <div id="payBox" class="mt-3">
          <div class="mb-3">
            <label class="form-label">Card number</label>
            <input class="form-control" placeholder="1234 5678 9012 3456">
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Expiry</label>
              <input class="form-control" placeholder="MM/YY">
            </div>
            <div class="col-6">
              <label class="form-label">CVC</label>
              <input class="form-control" placeholder="123">
            </div>
          </div>
        </div>
        <div id="voucherBox" class="mt-3 d-none">
          <div class="mb-3">
            <label class="form-label">Voucher code</label>
            <input class="form-control" id="voucherCode" placeholder="Enter voucher code">
          </div>
        </div>
        <div class="d-flex flex-wrap gap-2 mt-3">
          <!-- confirm and cancel buttons -->
          <button class="btn btn-fs-primary" id="confirmOrderBtn" type="button">Confirm Order</button>
          <a class="btn btn-fs-outline" href="product-produce.html">Cancel</a>
        </div>
        <div id="checkoutNotice" class="notice-box d-none mt-3"></div>
        <div class="hr-soft"></div>
        <!-- real-time status demo -->
        <h2 class="fs-title-md">Real-time status (demo)</h2>
        <div class="d-flex gap-2 align-items-center">
          <span class="k-label">Status:</span>
          <span id="statusLine" class="badge-pill badge-info">Not submitted</span>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="app.js"></script>
</body>
</html>
