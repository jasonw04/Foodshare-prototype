<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FoodShare - Create Listing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top fs-navbar">
  <div class="container page-wrap py-2">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="index.html">
      <span class="brand-mark"></span>
      <span>FoodShare</span>
    </a>
  </div>
</nav>

<main class="container page-wrap py-4 py-md-5">
  <section class="fs-card p-4">
    <h1 class="fs-title-lg mb-3">Create Listing</h1>

    <form>
      <div class="mb-3">
        <label class="form-label">Listing name</label>
        <input type="text" class="form-control" placeholder="e.g. Chicken Teriyaki Bowl">
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-select">
          <option>Surplus meal</option>
          <option>Donation box</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Price / voucher</label>
        <input type="text" class="form-control" placeholder="e.g. $6.99 or Donation">
      </div>

      <div class="mb-3">
        <label class="form-label">Pickup / delivery window</label>
        <input type="text" class="form-control" placeholder="e.g. Pickup 6–8 PM">
      </div>

      <div class="mb-3">
        <label class="form-label">Allergens / notes</label>
        <textarea class="form-control" rows="4" placeholder="Add allergens, portion size, nutrition, or notes"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-fs-primary">Save Listing</button>
        <a href="dashboard.html" class="btn btn-fs-outline">Cancel</a>
      </div>
    </form>
  </section>
</main>
</body>
</html>
