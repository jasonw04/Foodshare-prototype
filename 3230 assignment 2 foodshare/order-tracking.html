<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FoodShare - Order Tracking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top fs-navbar">
  <div class="container page-wrap py-2">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="index.html">
      <span class="brand-mark"></span>
      <span>FoodShare</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="mainNav">
      <div class="navbar-nav gap-2 mt-3 mt-lg-0">
        <a class="nav-link fs-link" href="index.html">Home</a>
        <a class="nav-link fs-link active" href="search.html">Browse</a>
        <a class="nav-link fs-link" href="dashboard.html">Provider Dashboard</a>
        <a class="nav-link fs-link" href="login.html">Login/Register</a>
      </div>
    </div>
  </div>
</nav>

<main class="container page-wrap py-4 py-md-5">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="fs-card p-4">
    <div class="order-track-panel">
      <h2 class="fs-title-md mb-1">Order tracking</h2>
      <div class="order-track-heading">Order status: <span id="trackingCurrentText">Requested</span></div>
      <div id="trackingMeta" class="text-muted-custom mb-3">FS-12843 - Live status updates</div>

      <div class="notice-box mb-4">
        <div class="kv-row">
          <span class="k-label">Item</span>
          <span class="k-value" id="trackingItem">Chicken Teriyaki Bowl</span>
        </div>
        <div class="kv-row">
          <span class="k-label">Provider</span>
          <span class="k-value" id="trackingProvider">Midtown Bento</span>
        </div>
        <div class="kv-row">
          <span class="k-label">Payment</span>
          <span class="k-value" id="trackingPayment">Paid online</span>
        </div>
      </div>

      <div class="tracking-stages">
        <div class="tracking-stage active" data-stage="requested">Requested</div>
        <div class="tracking-stage" data-stage="accepted">Accepted</div>
        <div class="tracking-stage" data-stage="preparing">Preparing</div>
        <div class="tracking-stage" data-stage="ready">Ready</div>
        <div class="tracking-stage" data-stage="completed">Completed</div>
      </div>

      <div class="review-box">
        <label class="review-label" for="reviewText">Write a review</label>
        <textarea id="reviewText" class="form-control review-textarea" placeholder="..."></textarea>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="app.js"></script>
</body>
</html>
