<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FoodShare - Manage Listings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top fs-navbar">
  <div class="container page-wrap py-2">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="index.html">
      <span class="brand-mark"></span>
      <span>FoodShare</span>
    </a>
  </div>
</nav>

<main class="container page-wrap py-4 py-md-5">
  <section class="fs-card p-4">

    <!-- manage listings -->
    <h1 class="fs-title-lg mb-3">Manage Listings</h1>

    <!-- edit pause and delete options for each listing -->
    <div class="row g-3">
      <div class="col-12">
        <div class="fs-card p-3">
          <h2 class="h5 mb-1">Chicken Teriyaki Bowl</h2>
          <p class="text-muted-custom mb-3">Active - Pickup 6–8 PM - 8 portions left</p>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-fs-outline">Edit</button>
            <button class="btn btn-fs-outline">Pause</button>
            <button class="btn btn-fs-outline">Delete</button>
          </div>
        </div>
      </div>

      <div class="col-12">
        <div class="fs-card p-3">
          <h2 class="h5 mb-1">Community Produce Box</h2>
          <p class="text-muted-custom mb-3">Active - Pickup 5–7 PM - 12 boxes left</p>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-fs-outline">Edit</button>
            <button class="btn btn-fs-outline">Pause</button>
            <button class="btn btn-fs-outline">Delete</button>
          </div>
        </div>
      </div>

      <div class="col-12">
        <div class="fs-card p-3">
          <h2 class="h5 mb-1">Veggie Pasta</h2>
          <p class="text-muted-custom mb-3">Paused - Delivery available - 4 portions left</p>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-fs-outline">Edit</button>
            <button class="btn btn-fs-outline">Resume</button>
            <button class="btn btn-fs-outline">Delete</button>
          </div>
        </div>
      </div>
    </div>
    <a href="dashboard.html" class="btn btn-fs-outline mb-3">&larr; Back</a>
  </section>
</main>
</body>
</html>
